<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Builder | Next-Gen Web Editor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h4>Nexus<span>Editor</span></h4>
                <p>Drag elements to canvas</p>
            </div>
            
            <div class="toolbox">
                <div class="tool-item" draggable="true" data-type="heading">
                    <i class="icon">T</i>
                    <span>Heading</span>
                </div>
                <div class="tool-item" draggable="true" data-type="text">
                    <i class="icon">p</i>
                    <span>Paragraph</span>
                </div>
                <div class="tool-item" draggable="true" data-type="button">
                    <i class="icon">▢</i>
                    <span>Action Button</span>
                </div>
                <div class="tool-item" draggable="true" data-type="image">
                    <i class="icon">🖼</i>
                    <span>Image Box</span>
                </div>
            </div>

            <div class="sidebar-footer">
                <button class="btn btn-outline-light w-100" onclick="clearCanvas()">Clear All</button>
            </div>
        </aside>

        <main class="canvas-area">
            <nav class="canvas-nav">
                <span class="badge bg-primary">Live Preview Mode</span>
            </nav>
            <div id="canvas" class="canvas-dropzone">
                <div class="empty-state">
                    <h3>Your Canvas is Empty</h3>
                    <p>Grab a component from the left to start building.</p>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
